<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập hệ thống</title>
  <style>
    body {
      background: #e8f5e9;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 35px;
      width: 340px;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #2e7d32;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }

    .error {
      margin-top: 10px;
      color: red;
      font-size: 14px;
    }

  </style>
</head>
<body>

<div class="login-box">
  <h2>Đăng nhập</h2>

  <form method="POST">
    <input name="username" placeholder="Tài khoản" required>
    <input name="password" type="password" placeholder="Mật khẩu" required>
    <button type="submit">Đăng nhập</button>
  </form>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
</div>

</body>
</html>
